name: Refresh Report

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - name: Generate report
        env:
          MAXMIND_ACCOUNT_ID: ${{ secrets.MAXMIND_ACCOUNT_ID }}
          MAXMIND_LICENSE_KEY: ${{ secrets.MAXMIND_LICENSE_KEY }}
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
          IP2LOCATION_TOKEN: ${{ secrets.IP2LOCATION_TOKEN }}
        run: python monitor-geofeed.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html aws.html as213151.html starlink.html
          git diff --cached --quiet || git commit -m "Update monitoring report"
          git push
