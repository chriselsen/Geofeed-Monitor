name: Refresh Report

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - name: Generate report
        env:
          MAXMIND_ACCOUNT_ID: ${{ secrets.MAXMIND_ACCOUNT_ID }}
          MAXMIND_LICENSE_KEY: ${{ secrets.MAXMIND_LICENSE_KEY }}
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
          IP2LOCATION_TOKEN: ${{ secrets.IP2LOCATION_TOKEN }}
          ARIN_API_KEY: ${{ secrets.ARIN_API_KEY }}
          SLACK_WEBHOOK_UNREACHABLE: ${{ secrets.SLACK_WEBHOOK_UNREACHABLE }}
          SLACK_WEBHOOK_EMBARGO: ${{ secrets.SLACK_WEBHOOK_EMBARGO }}
          SLACK_WEBHOOK_NEW_LOCATION: ${{ secrets.SLACK_WEBHOOK_NEW_LOCATION }}
          SLACK_WEBHOOK_REMOVED_LOCATION: ${{ secrets.SLACK_WEBHOOK_REMOVED_LOCATION }}
          SLACK_WEBHOOK_NEW_PREFIX: ${{ secrets.SLACK_WEBHOOK_NEW_PREFIX }}
          SLACK_WEBHOOK_REMOVED_PREFIX: ${{ secrets.SLACK_WEBHOOK_REMOVED_PREFIX }}
          SLACK_WEBHOOK_ACCURACY_DROP: ${{ secrets.SLACK_WEBHOOK_ACCURACY_DROP }}
          SLACK_WEBHOOK_UNROUTED: ${{ secrets.SLACK_WEBHOOK_UNROUTED }}
          SLACK_WEBHOOK_LOCODE: ${{ secrets.SLACK_WEBHOOK_LOCODE }}
          SLACK_WEBHOOK_AWS_UNREACHABLE: ${{ secrets.SLACK_WEBHOOK_AWS_UNREACHABLE }}
          SLACK_WEBHOOK_AWS_EMBARGO: ${{ secrets.SLACK_WEBHOOK_AWS_EMBARGO }}
          SLACK_WEBHOOK_AWS_NEW_LOCATION: ${{ secrets.SLACK_WEBHOOK_AWS_NEW_LOCATION }}
          SLACK_WEBHOOK_AWS_REMOVED_LOCATION: ${{ secrets.SLACK_WEBHOOK_AWS_REMOVED_LOCATION }}
          SLACK_WEBHOOK_AWS_NEW_PREFIX: ${{ secrets.SLACK_WEBHOOK_AWS_NEW_PREFIX }}
          SLACK_WEBHOOK_AWS_REMOVED_PREFIX: ${{ secrets.SLACK_WEBHOOK_AWS_REMOVED_PREFIX }}
          SLACK_WEBHOOK_AWS_ACCURACY_DROP: ${{ secrets.SLACK_WEBHOOK_AWS_ACCURACY_DROP }}
          SLACK_WEBHOOK_AWS_UNROUTED: ${{ secrets.SLACK_WEBHOOK_AWS_UNROUTED }}
          SLACK_WEBHOOK_AWS_LOCODE: ${{ secrets.SLACK_WEBHOOK_AWS_LOCODE }}
          SLACK_WEBHOOK_GCP_UNREACHABLE: ${{ secrets.SLACK_WEBHOOK_GCP_UNREACHABLE }}
          SLACK_WEBHOOK_GCP_EMBARGO: ${{ secrets.SLACK_WEBHOOK_GCP_EMBARGO }}
          SLACK_WEBHOOK_GCP_NEW_LOCATION: ${{ secrets.SLACK_WEBHOOK_GCP_NEW_LOCATION }}
          SLACK_WEBHOOK_GCP_REMOVED_LOCATION: ${{ secrets.SLACK_WEBHOOK_GCP_REMOVED_LOCATION }}
          SLACK_WEBHOOK_GCP_NEW_PREFIX: ${{ secrets.SLACK_WEBHOOK_GCP_NEW_PREFIX }}
          SLACK_WEBHOOK_GCP_REMOVED_PREFIX: ${{ secrets.SLACK_WEBHOOK_GCP_REMOVED_PREFIX }}
          SLACK_WEBHOOK_GCP_ACCURACY_DROP: ${{ secrets.SLACK_WEBHOOK_GCP_ACCURACY_DROP }}
          SLACK_WEBHOOK_GCP_UNROUTED: ${{ secrets.SLACK_WEBHOOK_GCP_UNROUTED }}
          SLACK_WEBHOOK_GCP_LOCODE: ${{ secrets.SLACK_WEBHOOK_GCP_LOCODE }}
          SLACK_WEBHOOK_MICROSOFT_UNREACHABLE: ${{ secrets.SLACK_WEBHOOK_MICROSOFT_UNREACHABLE }}
          SLACK_WEBHOOK_MICROSOFT_EMBARGO: ${{ secrets.SLACK_WEBHOOK_MICROSOFT_EMBARGO }}
          SLACK_WEBHOOK_MICROSOFT_NEW_LOCATION: ${{ secrets.SLACK_WEBHOOK_MICROSOFT_NEW_LOCATION }}
          SLACK_WEBHOOK_MICROSOFT_REMOVED_LOCATION: ${{ secrets.SLACK_WEBHOOK_MICROSOFT_REMOVED_LOCATION }}
          SLACK_WEBHOOK_MICROSOFT_NEW_PREFIX: ${{ secrets.SLACK_WEBHOOK_MICROSOFT_NEW_PREFIX }}
          SLACK_WEBHOOK_MICROSOFT_REMOVED_PREFIX: ${{ secrets.SLACK_WEBHOOK_MICROSOFT_REMOVED_PREFIX }}
          SLACK_WEBHOOK_MICROSOFT_ACCURACY_DROP: ${{ secrets.SLACK_WEBHOOK_MICROSOFT_ACCURACY_DROP }}
          SLACK_WEBHOOK_MICROSOFT_UNROUTED: ${{ secrets.SLACK_WEBHOOK_MICROSOFT_UNROUTED }}
          SLACK_WEBHOOK_MICROSOFT_LOCODE: ${{ secrets.SLACK_WEBHOOK_MICROSOFT_LOCODE }}
          SLACK_WEBHOOK_AWS_CE_UNREACHABLE: ${{ secrets.SLACK_WEBHOOK_AWS_CE_UNREACHABLE }}
          SLACK_WEBHOOK_AWS_CE_EMBARGO: ${{ secrets.SLACK_WEBHOOK_AWS_CE_EMBARGO }}
          SLACK_WEBHOOK_AWS_CE_NEW_LOCATION: ${{ secrets.SLACK_WEBHOOK_AWS_CE_NEW_LOCATION }}
          SLACK_WEBHOOK_AWS_CE_REMOVED_LOCATION: ${{ secrets.SLACK_WEBHOOK_AWS_CE_REMOVED_LOCATION }}
          SLACK_WEBHOOK_AWS_CE_NEW_PREFIX: ${{ secrets.SLACK_WEBHOOK_AWS_CE_NEW_PREFIX }}
          SLACK_WEBHOOK_AWS_CE_REMOVED_PREFIX: ${{ secrets.SLACK_WEBHOOK_AWS_CE_REMOVED_PREFIX }}
          SLACK_WEBHOOK_AWS_CE_ACCURACY_DROP: ${{ secrets.SLACK_WEBHOOK_AWS_CE_ACCURACY_DROP }}
          SLACK_WEBHOOK_AWS_CE_UNROUTED: ${{ secrets.SLACK_WEBHOOK_AWS_CE_UNROUTED }}
          SLACK_WEBHOOK_AWS_CE_LOCODE: ${{ secrets.SLACK_WEBHOOK_AWS_CE_LOCODE }}
          SLACK_WEBHOOK_AS213151_UNREACHABLE: ${{ secrets.SLACK_WEBHOOK_AS213151_UNREACHABLE }}
          SLACK_WEBHOOK_AS213151_EMBARGO: ${{ secrets.SLACK_WEBHOOK_AS213151_EMBARGO }}
          SLACK_WEBHOOK_AS213151_NEW_LOCATION: ${{ secrets.SLACK_WEBHOOK_AS213151_NEW_LOCATION }}
          SLACK_WEBHOOK_AS213151_REMOVED_LOCATION: ${{ secrets.SLACK_WEBHOOK_AS213151_REMOVED_LOCATION }}
          SLACK_WEBHOOK_AS213151_NEW_PREFIX: ${{ secrets.SLACK_WEBHOOK_AS213151_NEW_PREFIX }}
          SLACK_WEBHOOK_AS213151_REMOVED_PREFIX: ${{ secrets.SLACK_WEBHOOK_AS213151_REMOVED_PREFIX }}
          SLACK_WEBHOOK_AS213151_ACCURACY_DROP: ${{ secrets.SLACK_WEBHOOK_AS213151_ACCURACY_DROP }}
          SLACK_WEBHOOK_AS213151_UNROUTED: ${{ secrets.SLACK_WEBHOOK_AS213151_UNROUTED }}
          SLACK_WEBHOOK_AS213151_LOCODE: ${{ secrets.SLACK_WEBHOOK_AS213151_LOCODE }}
          SLACK_WEBHOOK_STARLINK_UNREACHABLE: ${{ secrets.SLACK_WEBHOOK_STARLINK_UNREACHABLE }}
          SLACK_WEBHOOK_STARLINK_EMBARGO: ${{ secrets.SLACK_WEBHOOK_STARLINK_EMBARGO }}
          SLACK_WEBHOOK_STARLINK_NEW_LOCATION: ${{ secrets.SLACK_WEBHOOK_STARLINK_NEW_LOCATION }}
          SLACK_WEBHOOK_STARLINK_REMOVED_LOCATION: ${{ secrets.SLACK_WEBHOOK_STARLINK_REMOVED_LOCATION }}
          SLACK_WEBHOOK_STARLINK_NEW_PREFIX: ${{ secrets.SLACK_WEBHOOK_STARLINK_NEW_PREFIX }}
          SLACK_WEBHOOK_STARLINK_REMOVED_PREFIX: ${{ secrets.SLACK_WEBHOOK_STARLINK_REMOVED_PREFIX }}
          SLACK_WEBHOOK_STARLINK_ACCURACY_DROP: ${{ secrets.SLACK_WEBHOOK_STARLINK_ACCURACY_DROP }}
          SLACK_WEBHOOK_STARLINK_UNROUTED: ${{ secrets.SLACK_WEBHOOK_STARLINK_UNROUTED }}
          SLACK_WEBHOOK_STARLINK_LOCODE: ${{ secrets.SLACK_WEBHOOK_STARLINK_LOCODE }}
        run: python monitor-geofeed.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked
          git pull --rebase
          git stash pop
          git add index.html aws.html gcp.html microsoft.html aws-ce.html as213151.html starlink.html state/
          git diff --cached --quiet || git commit -m "Update monitoring report"
          git push
